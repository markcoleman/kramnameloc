<!doctype html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          if (stored === "light" || stored === "dark") {
            document.documentElement.setAttribute("data-theme", stored);
          }
        } catch (e) {
          return;
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
    {% seo %}
    {%- feed_meta -%}
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <div class="bg-shape bg-shape-a" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-b" aria-hidden="true"></div>

    <header class="site-header">
      <div class="brand-group">
        <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <p class="tagline">{{ site.description }}</p>
      </div>
      <div class="header-actions">
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/archive/' | relative_url }}">Archive</a>
          <a href="{{ '/topics/' | relative_url }}">Topics</a>
          <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
        </nav>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme">
          <span aria-hidden="true">◐</span>
        </button>
      </div>
    </header>

    <main id="main-content" class="page-shell" tabindex="-1">{{ content }}</main>

    <footer class="site-footer">
      <nav class="footer-nav" aria-label="Footer">
        <a href="{{ '/' | relative_url }}">Latest</a>
        <a href="{{ '/archive/' | relative_url }}">Archive</a>
        <a href="{{ '/topics/' | relative_url }}">Topics</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS feed</a>
      </nav>
      <p>&copy; {{ 'now' | date: '%Y' }} {{ site.title }}. Built with Jekyll + GitHub Pages.</p>
    </footer>

    <script>
      window.siteConfig = {
        baseUrl: {{ site.baseurl | jsonify }},
        siteUrl: {{ site.url | jsonify }},
        canonicalHost: {{ site.domain | jsonify }}
      };
    </script>
    <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
  </body>
</html>
