title: Kramnameloc
description: Notes on software, automation, and thoughtful engineering.
url: ""
baseurl: ""
lang: en-US
timezone: America/New_York
markdown: kramdown
highlighter: rouge
permalink: /:title/

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post

exclude:
  - blog.xml
  - scripts/
  - README.md
