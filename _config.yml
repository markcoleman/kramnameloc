title: Kramnameloc
description: Notes on software, automation, and thoughtful engineering.
url: "https://kramnameloc.com"
baseurl: ""
domain: "kramnameloc.com"
lang: en-US
locale: en_US
timezone: America/New_York
markdown: kramdown
highlighter: rouge
permalink: /:title/
keywords:
  - software engineering
  - automation
  - dev notes
  - programming
  - engineering blog
  - cloud

author:
  name: Kramnameloc
  twitter: kramnameloc

twitter:
  username: kramnameloc
  card: summary_large_image

social:
  name: Kramnameloc
  links:
    - https://github.com/kramnameloc

logo: /assets/images/site-logo.svg
image: /assets/images/social-card.svg

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      image: /assets/images/social-card.svg
      summary: ""
      tags: []
  - scope:
      path: ""
    values:
      image: /assets/images/social-card.svg

exclude:
  - vendor
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - blog.xml
  - scripts/
  - README.md
